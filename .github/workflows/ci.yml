name: CI

on:
  pull_request: {}
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Sanitize repository slug
        uses: actions/github-script@v8
        id: repository_slug
        with:
          result-encoding: string
          script: return '${{ github.repository }}'.toLowerCase()

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ steps.repository_slug.outputs.result }}
          tags: |
            type=sha,prefix=,format=long

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          build-args: |
            RELEASE=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish:
    name: Publish to Docker registry
    needs:
      - build
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest

    permissions:
      packages: write

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize repository slug
        uses: actions/github-script@v8
        id: repository_slug
        with:
          result-encoding: string
          script: return '${{ github.repository }}'.toLowerCase()

      - name: Tag Docker images with as latest
        run: |
          DOCKER_IMAGE="ghcr.io/${{ steps.repository_slug.outputs.result }}"
          docker pull $DOCKER_IMAGE:$GITHUB_SHA
          docker tag $DOCKER_IMAGE:$GITHUB_SHA $DOCKER_IMAGE:latest
          docker push $DOCKER_IMAGE:latest
